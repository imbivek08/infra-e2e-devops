services:
  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: appdb
    expose:
      - "5000"
    depends_on:
      - postgres
        
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---- Frontend (Nginx + React) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jerney-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data: