name: Release

on:
  workflow_run:
    workflows:
      - "Build & Push"
    types:
      - completed
    branches:
      - main
      - dev

jobs:
  update-manifest:
    name: Update image tag in manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set image tag
        id: meta
        run: |
          echo "tag=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Update backend image tag
        run: |
          sed -i "s|image: imbivek01/blog-backend:.*|image: imbivek01/blog-backend:${{ steps.meta.outputs.tag }}|g" \
            k8s/backend/deployment.yml

      - name: Update frontend image tag
        run: |
          sed -i "s|image: imbivek01/blog-frontend:.*|image: imbivek01/blog-frontend:${{ steps.meta.outputs.tag }}|g" \
            k8s/frontend/deployment.yml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yml k8s/frontend/deployment.yml
          git diff --staged --quiet || git commit -m "release: bump image tag to ${{ steps.meta.outputs.tag }}"
          git push