name: Build & Push

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
env:
  REGISTRY: docker.io
  IMAGE_BACKEND: blog-backend
  IMAGE_FRONTEND: blog-frontend

jobs:
  build:
    name: Build — ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: false
          load: true
          tags: ${{ matrix.component }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Save image as tar
        run: docker save ${{ matrix.component }}:${{ steps.meta.outputs.tag }} -o /tmp/${{ matrix.component }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}-image
          path: /tmp/${{ matrix.component }}.tar
          retention-days: 1

  scan:
    name: Scan — ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.component }}-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/${{ matrix.component }}.tar

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.component }}:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: 0 #does not block the pipeline
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  push:
    name: Push — ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: scan
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            echo "name=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}" >> $GITHUB_OUTPUT
          fi

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.component }}-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/${{ matrix.component }}.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push image
        run: |
          docker tag ${{ matrix.component }}:${{ steps.meta.outputs.tag }} ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.tag }}
          docker tag ${{ matrix.component }}:${{ steps.meta.outputs.tag }} ${{ steps.image.outputs.name }}:latest
          docker push ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Output image tag
        run: echo "Pushed ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.tag }}"